<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ClickBench Playground &mdash; run SQL against 90+ databases</title>
<link rel="stylesheet" href="style.css?v=23">
</head>
<body>
<header>
    <div class="title-row">
        <h1>ClickBench Playground <span class="muted">&mdash; run SQL against 90+ databases</span></h1>
        <a class="github-stars" href="https://github.com/ClickHouse/ClickBench/" target="_blank" rel="noopener noreferrer" aria-label="Star ClickBench on GitHub" title="Star ClickBench on GitHub">
            <svg class="github-stars-icon" viewBox="0 0 16 16" aria-hidden="true"><path d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.751.751 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25Z"/></svg>
            <span>Star</span>
            <span class="github-stars-count" id="github-stars-count"></span>
        </a>
    </div>
</header>

<main>
    <section>
        <div id="system-list" class="system-list"></div>
    </section>

    <section class="row" id="ui-active">
        <button id="run">Run query</button>
        <label for="example" class="row-label">Example</label>
        <select id="example"></select>
        <button id="run-all" class="run-all" type="button" style="display:none"
                title="Run this query on every snapshotted system in parallel — per-system translation if an example is picked, exact text otherwise">Run all</button>
    </section>

    <div id="ui-split">
        <aside id="ui-runall" style="display:none" tabindex="0">
            <table id="runall-table">
                <tbody></tbody>
            </table>
        </aside>

        <div id="ui-main">
            <section id="ui-query">
                <textarea id="query" rows="10"
                    spellcheck="false" autocomplete="off" autocorrect="off"
                    autocapitalize="off"
                    data-gramm="false" data-gramm_editor="false"
                    data-enable-grammarly="false">SELECT COUNT(*) FROM hits;</textarea>
            </section>

            <section class="row stats" id="ui-stats" style="display:none">
                <div>Time: <span id="time">&mdash;</span></div>
            </section>

            <section id="ui-output" style="display:none">
                <label for="output" id="output-label">Output</label>
                <pre id="output"></pre>
            </section>

            <section id="ui-down" style="display:none">
                <label>Last error</label>
                <pre id="last-error"></pre>
            </section>

            <section>
                <details>
                    <summary>System status</summary>
                    <pre id="state-blob">loading&hellip;</pre>
                </details>
            </section>
        </div>
    </div>
</main>

<script src="app.js?v=36"></script>
<script>
(function () {
    var el = document.getElementById('github-stars-count');
    if (!el) return;
    var REPO = 'ClickHouse/ClickBench';
    var CACHE_KEY = 'github-stars-' + REPO;
    var TTL = 6 * 3600 * 1000;

    function format(n) {
        return '' + n;
    }
    function show(n) { el.textContent = format(n); }

    try {
        var cached = JSON.parse(localStorage.getItem(CACHE_KEY) || 'null');
        if (cached && (Date.now() - cached.t) < TTL) { show(cached.n); return; }
    } catch (e) {}

    fetch('https://api.github.com/repos/' + REPO)
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (d) {
            if (!d || typeof d.stargazers_count !== 'number') return;
            show(d.stargazers_count);
            try { localStorage.setItem(CACHE_KEY, JSON.stringify({ n: d.stargazers_count, t: Date.now() })); } catch (e) {}
        })
        .catch(function () {});
})();
</script>
</body>
</html>
